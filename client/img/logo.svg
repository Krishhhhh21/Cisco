<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow envelope (upper right, slightly behind lens) -->
  <rect x="110" y="8" width="100" height="68" rx="4" fill="#f5b800" stroke="#111" stroke-width="7" stroke-linejoin="round"/>
  <polyline points="110,8 160,46 210,8" fill="none" stroke="#111" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Magnifying glass: green fill circle -->
  <circle cx="84" cy="108" r="78" fill="#28b820" stroke="#111" stroke-width="7"/>

  <!-- White left half (half-moon highlight) -->
  <path d="M84,30 A78,78 0 0 0 84,186 Z" fill="white"/>

  <!-- Grid lines on green right half -->
  <clipPath id="gc">
    <rect x="84" y="30" width="78" height="156"/>
  </clipPath>
  <g clip-path="url(#gc)" stroke="#111" stroke-width="6" stroke-linecap="square">
    <!-- Vertical grid lines -->
    <line x1="84"  y1="30" x2="84"  y2="186"/>
    <line x1="110" y1="30" x2="110" y2="186"/>
    <line x1="136" y1="38" x2="136" y2="186"/>
    <line x1="162" y1="58" x2="162" y2="178"/>
    <!-- Horizontal grid lines -->
    <line x1="6"  y1="72"  x2="162" y2="72"/>
    <line x1="6"  y1="108" x2="162" y2="108"/>
    <line x1="6"  y1="144" x2="162" y2="144"/>
  </g>

  <!-- Center dividing line -->
  <line x1="84" y1="30" x2="84" y2="186" stroke="#111" stroke-width="5"/>

  <!-- Magnifying glass circle outline -->
  <circle cx="84" cy="108" r="78" fill="none" stroke="#111" stroke-width="7"/>

  <!-- Handle -->
  <line x1="143" y1="167" x2="196" y2="212" stroke="#111" stroke-width="22" stroke-linecap="round"/>
</svg>
